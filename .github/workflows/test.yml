name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .
      - name: Run supported-package tests
        run: python -m unittest discover -s tests -v
      - name: Run historical benchmark tests
        working-directory: benchmark
        run: python -m pip install -r requirements.txt && python -m unittest discover -s tests -v
      - name: Smoke-test CLI
        run: satrl solve examples/pigeonhole_3_2.cnf --json
